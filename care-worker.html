<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CareOn · 요양보호사 앱</title>
<meta name="description" content="CareOn 요양보호사 앱 — 오늘 방문 일정, GPS 체크인, 케어일지 작성을 한 화면에서.">
<meta property="og:type" content="website">
<meta property="og:title" content="요양 통합 플랫폼 · CareOn">
<meta property="og:description" content="요양보호사 앱 — 오늘 방문 일정 / GPS 체크인 / 케어일지 작성">
<meta property="og:image" content="https://crescentstudio.co.kr/careon-icon.svg">
<meta property="og:url" content="https://crescentstudio.co.kr/care-worker.html">
<meta property="og:site_name" content="CareOn">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0D9488">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CareOn">
<link rel="apple-touch-icon" href="/careon-icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="/center-router.js"></script>
<script src="/push-client.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--teal:#0D9488;--teal2:#14B8A6;--tl:#F0FDFA;--navy:#0F1B2D;--gray:#6b7280;--border:#f0f0f0;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f8fafc;color:var(--navy);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

.hd{background:var(--teal);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd-left{display:flex;align-items:center;gap:10px}
.hd-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid rgba(255,255,255,.4)}
.hd-name{font-size:15px;font-weight:800;color:#fff}
.hd-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px}
.hd-right{display:flex;align-items:center;gap:8px}
.hd-bell{font-size:20px;cursor:pointer}

.wrap{padding:16px}

.empty-msg{background:#fff;border-radius:18px;padding:40px 20px;text-align:center;color:var(--gray);border:1px solid var(--border);margin-bottom:14px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

.route-card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.route-ttl{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.route-ttl-txt{display:flex;align-items:center;gap:6px}
.route-ttl-txt::before{content:'';width:3px;height:12px;background:var(--teal);border-radius:2px;display:block}
.route-date{font-size:11px;color:var(--teal);font-weight:700}
.route-list{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.route-list::-webkit-scrollbar{display:none}
.route-stop{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer}
.rs-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid var(--border);background:#fff}
.rs-circle.done{border-color:var(--green);background:#f0fdf4}
.rs-circle.active{border-color:var(--teal);background:var(--tl);box-shadow:0 0 0 4px rgba(13,148,136,.15)}
.rs-name{font-size:10px;font-weight:600;color:var(--navy);margin-top:5px;text-align:center;white-space:nowrap}
.rs-time{font-size:10px;color:var(--gray);margin-top:1px}
.route-line{width:28px;height:2px;background:var(--border);flex-shrink:0;margin-bottom:20px}
.route-line.done{background:var(--green)}

.visit-card{background:linear-gradient(135deg,#042f2e,#0f766e);border-radius:22px;padding:22px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.visit-card::after{content:'🏠';position:absolute;right:-10px;bottom:-15px;font-size:90px;opacity:.08}
.visit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.visit-name{font-size:18px;font-weight:800}
.visit-status{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700}
.v-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.visit-addr{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px}
.visit-time{display:flex;gap:0;margin-bottom:16px}
.vt-item{flex:1;text-align:center}
.vt-item+.vt-item{border-left:1px solid rgba(255,255,255,.2)}
.vt-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:3px}
.vt-val{font-size:16px;font-weight:800}

.gps-btn{background:#fff;color:var(--teal);border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.gps-btn.checked{background:var(--green);color:#fff}
.gps-btn:disabled{opacity:.6;cursor:not-allowed}
.navi-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:12px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}

.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.card-ttl{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-ttl-txt{display:flex;align-items:center;gap:6px}
.card-ttl-txt::before{content:'';width:3px;height:12px;background:var(--teal);border-radius:2px;display:block}
.progress-bar{height:6px;background:var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:10px;transition:width .4s}

.check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;background:#fff}
.check-box.checked{background:var(--teal);border-color:var(--teal);color:#fff}
.check-content{flex:1}
.check-ttl{font-size:14px;font-weight:700;color:var(--navy)}
.check-sub{font-size:11px;color:var(--gray);margin-top:2px}
.check-time{font-size:11px;color:var(--teal);font-weight:700}

.memo-box{background:var(--tl);border-radius:12px;padding:14px;border:1px solid #99f6e4;margin-bottom:14px}
.memo-lbl{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:8px}
.memo-input{width:100%;background:transparent;border:none;font-family:inherit;font-size:13px;color:var(--navy);line-height:1.7;resize:none;outline:none}

.complete-btn{background:var(--teal);color:#fff;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(13,148,136,.4)}
.complete-btn:disabled{opacity:.6;cursor:not-allowed}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:var(--gray);font-weight:600;padding:4px 0}
.bnav-item.active{color:var(--teal)}
.bnav-icon{font-size:22px}

/* GPS 거리 경고 */
.gps-warn{background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#92400e;line-height:1.6}
.gps-warn.danger{background:#fee2e2;border-color:#fca5a5;color:#991b1b}

/* 사진 업로드 */
.photo-section{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.photo-thumb{aspect-ratio:1;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;position:relative;overflow:hidden}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb.add{background:var(--tl);color:var(--teal);border:2px dashed var(--teal2)}
.photo-thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:none;cursor:pointer}

/* 뷰 시스템 */
.view{display:none}
.view.active{display:block}

/* 케어일지 카드 */
.log-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer}
.log-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.log-name{font-size:14px;font-weight:700;color:var(--navy)}
.log-date{font-size:11px;color:var(--gray)}
.log-meta{display:flex;gap:12px;font-size:11px;color:var(--gray)}
.log-meta span{display:flex;align-items:center;gap:3px}
.log-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.log-status.done{background:#dcfce7;color:#16a34a}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <div class="hd-avatar">👩‍⚕️</div>
    <div>
      <div class="hd-name" id="workerName">로딩 중...</div>
      <div class="hd-sub" id="workerSub">오늘 일정 확인 중</div>
    </div>
  </div>
  <div class="hd-right">
    <div class="hd-bell" onclick="enablePush()">🔔</div>
    <div id="liveClock" style="font-size:13px;font-weight:800;color:#fff;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;letter-spacing:.5px"></div>
  </div>
</div>

<div class="wrap" id="mainWrap">

<!-- ========== 오늘일정 뷰 ========== -->
<div class="view active" id="view-today">

  <!-- GPS 경고 표시 -->
  <div class="gps-warn" id="gpsWarn" style="display:none"></div>

  <!-- 오늘 루트 -->
  <div class="route-card" id="routeCard" style="display:none">
    <div class="route-ttl">
      <span class="route-ttl-txt">오늘 방문 루트</span>
      <span class="route-date" id="routeDate"></span>
    </div>
    <div class="route-list" id="routeList"></div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty-msg" id="emptyMsg" style="display:none">
    <div class="empty-icon">📋</div>
    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px">오늘 예정된 방문이 없습니다</div>
    <div style="font-size:12px">센터장에게 일정 등록을 요청하세요</div>
  </div>

  <!-- 현재 방문지 -->
  <div class="visit-card" id="visitCard" style="display:none">
    <div class="visit-top">
      <div class="visit-name" id="visitName">-</div>
      <div class="visit-status" id="visitStatus"><span class="v-dot"></span>대기</div>
    </div>
    <div class="visit-addr" id="visitAddr">📍 -</div>
    <div class="visit-time">
      <div class="vt-item"><div class="vt-lbl">방문 시작</div><div class="vt-val" id="vtStart">-</div></div>
      <div class="vt-item"><div class="vt-lbl">예정 종료</div><div class="vt-val" id="vtEnd">-</div></div>
      <div class="vt-item"><div class="vt-lbl">경과</div><div class="vt-val" id="elapsed">-</div></div>
    </div>
    <button class="gps-btn" id="gpsBtn" onclick="doCheckin()">🛰️ GPS 체크인</button>
    <button class="navi-btn" id="naviBtn" onclick="openNavi()">🗺️ 네비게이션 열기</button>
  </div>

  <!-- 케어 체크리스트 -->
  <div class="card" id="checklistCard" style="display:none">
    <div class="card-ttl">
      <span class="card-ttl-txt">케어 체크리스트</span>
      <span id="checkProgress" style="font-size:11px;color:var(--teal);font-weight:700">0/5 완료</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="checklistItems"></div>
  </div>

  <!-- 사진 업로드 -->
  <div class="photo-section" id="photoSection" style="display:none">
    <div class="card-ttl"><span class="card-ttl-txt">📷 케어 사진</span><span style="font-size:11px;color:var(--gray)" id="photoCount">0장</span></div>
    <div style="font-size:11px;color:var(--gray);margin-bottom:8px">식사·활동·상태 등을 사진으로 기록하세요. 보호자에게 공유됩니다.</div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="uploadPhoto(this)">
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <!-- 메모 -->
  <div class="memo-box" id="memoBox" style="display:none">
    <div class="memo-lbl">📝 오늘 특이사항 메모</div>
    <textarea class="memo-input" id="memoInput" rows="3" maxlength="2000" placeholder="어르신 상태, 특이사항 등을 입력해주세요..."></textarea>
  </div>

  <!-- 완료 버튼 -->
  <button class="complete-btn" id="completeBtn" onclick="completeVisit()" style="display:none">✅ 케어 완료 전송</button>
</div>

<!-- ========== 케어일지 뷰 ========== -->
<div class="view" id="view-log">
  <div class="card-ttl" style="margin:14px 4px"><span class="card-ttl-txt">📋 최근 케어일지</span></div>
  <div id="logList">
    <div class="empty-msg"><div class="empty-icon">📋</div><div style="font-size:13px">로딩 중...</div></div>
  </div>
</div>

<!-- ========== 수급자 뷰 ========== -->
<div class="view" id="view-patients">
  <div class="card-ttl" style="margin:14px 4px"><span class="card-ttl-txt">👴 담당 수급자</span></div>
  <div id="patientList">
    <div class="empty-msg"><div class="empty-icon">👴</div><div style="font-size:13px">로딩 중...</div></div>
  </div>
</div>

<!-- ========== 내정보 뷰 ========== -->
<div class="view" id="view-me">
  <div class="card" style="margin-top:14px">
    <div class="card-ttl"><span class="card-ttl-txt">👤 내 정보</span></div>
    <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
      <div><b>이름</b> <span id="meName" style="color:var(--gray);margin-left:8px">-</span></div>
      <div><b>연락처</b> <span id="mePhone" style="color:var(--gray);margin-left:8px">-</span></div>
      <div><b>입사일</b> <span id="meHire" style="color:var(--gray);margin-left:8px">-</span></div>
      <div><b>소속 센터</b> <span id="meCenter" style="color:var(--gray);margin-left:8px">-</span></div>
    </div>
  </div>
  <button class="complete-btn" style="background:var(--gray);box-shadow:none;margin-top:14px" onclick="enablePush()">🔔 알림 활성화</button>
  <button class="complete-btn" style="background:var(--red);box-shadow:none;margin-top:8px" onclick="doLogout()">🚪 로그아웃</button>
</div>

</div>

<div class="bnav">
  <div class="bnav-item active" data-view="today" onclick="showView('today')"><span class="bnav-icon">🏠</span>오늘일정</div>
  <div class="bnav-item" data-view="log" onclick="showView('log')"><span class="bnav-icon">📋</span>케어일지</div>
  <div class="bnav-item" data-view="patients" onclick="showView('patients')"><span class="bnav-icon">👴</span>수급자</div>
  <div class="bnav-item" data-view="me" onclick="showView('me')"><span class="bnav-icon">👤</span>내정보</div>
</div>

<script>
// ===== 기본 체크리스트 (5개 표준 항목) =====
const DEFAULT_CHECKLIST = [
  { id:'meal',    icon:'🍚', title:'식사 보조',  sub:'식사량 확인 및 보조' },
  { id:'posture', icon:'🤸', title:'체위 변경',  sub:'2시간마다 자세 변경' },
  { id:'stretch', icon:'🧘', title:'스트레칭',   sub:'관절 운동 및 스트레칭' },
  { id:'medi',    icon:'💊', title:'투약 확인',  sub:'처방약 복용 확인' },
  { id:'hygiene', icon:'🛁', title:'청결 케어',  sub:'구강 청결 및 세면' }
];

// ===== 상태 =====
let sb = null;
let _session = null;
let _profile = null;
let _worker = null;
let _todayVisits = [];
let _currentVisit = null;
let _checklist = JSON.parse(JSON.stringify(DEFAULT_CHECKLIST.map(i => ({...i, done:false, time:null}))));

// ===== 시계 =====
(function tick() {
  const now = new Date();
  document.getElementById('liveClock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');

  if(_currentVisit && _currentVisit.start_time && _currentVisit.status === 'in_progress'){
    const [h,m] = _currentVisit.start_time.split(':').map(Number);
    const start = new Date();
    start.setHours(h, m, 0, 0);
    const diff = Math.max(0, Math.floor((now - start)/60000));
    const elEl = document.getElementById('elapsed');
    if(elEl) elEl.textContent = diff < 60 ? diff+'분' : Math.floor(diff/60)+'시간 '+(diff%60)+'분';
  }
  setTimeout(tick, 1000);
})();

// ===== 부팅 =====
window.addEventListener('load', async () => {
  sb = window.supabase.createClient(
    'https://swsemxzgzcwwrhowuaqz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3c2VteHpnemN3d3Job3d1YXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDMyMjAsImV4cCI6MjA5MjcxOTIyMH0.ebLiCDnTfnd-rCcBcMFiN_BYpIcOcTqfi_Mh_xQqD2Q'
  );

  // 세션 체크
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ location.href = CenterRouter.buildUrl('/care-login.html'); return; }
  _session = session;

  // 프로필 + 보호사 정보 로드
  const { data: profile } = await sb.from('profiles')
    .select('*, centers(name, phone)')
    .eq('id', session.user.id).single();

  if(!profile || profile.role !== 'worker'){
    alert('보호사 계정이 아닙니다.');
    await sb.auth.signOut();
    location.href = '/care-login.html';
    return;
  }
  _profile = profile;

  // 보호사 레코드 조회 (profile_id로 매칭)
  const { data: worker } = await sb.from('workers')
    .select('*').eq('profile_id', session.user.id).maybeSingle();
  _worker = worker;

  document.getElementById('workerName').textContent = (profile.name || '보호사') + ' 보호사님';

  // 오늘의 방문 일정 로드
  await loadTodayVisits();
});

// ===== 오늘 일정 로드 =====
async function loadTodayVisits(){
  if(!_worker){
    document.getElementById('workerSub').textContent = '보호사 등록이 필요합니다';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  const today = new Date().toISOString().split('T')[0];
  const { data: visits } = await sb.from('visits')
    .select('*, patients(name, address, phone, guardian_name, guardian_phone)')

    document.getElementById('emptyMsg').style.display = 'block';
    document.getElementById('routeCard').style.display = 'none';
    document.getElementById('visitCard').style.display = 'none';
    document.getElementById('checklistCard').style.display = 'none';
    document.getElementById('memoBox').style.display = 'none';
    document.getElementById('completeBtn').style.display = 'none';
    return;
  }

  sub.textContent = `오늘 ${_todayVisits.length}건 방문 예정`;
  document.getElementById('emptyMsg').style.display = 'none';

  // 루트 렌더
  renderRoute();

  _currentVisit = _todayVisits.find(v => v.status === 'in_progress')
                 || _todayVisits.find(v => v.status === 'scheduled')

function renderRoute(){
  const list = document.getElementById('routeList');
  const card = document.getElementById('routeCard');
  card.style.display = 'block';

  const today = new Date();
  document.getElementById('routeDate').textContent =
    `${today.getMonth()+1}월 ${today.getDate()}일 · 총 ${_todayVisits.length}곳`;

  list.innerHTML = _todayVisits.map((v, i) => {
    const cls = v.status==='completed' ? 'done' : (v.status==='in_progress' ? 'active' : '');
    const icon = v.status==='completed' ? '✅' : (v.status==='in_progress' ? '🏠' : '⏳');
    const lineCls = i < _todayVisits.length-1 && _todayVisits[i].status==='completed' ? 'done' : '';
    const time = (v.start_time || '').slice(0,5) || '-';
    const name = (v.patients?.name || '?').replace(/(.{3})/g, '$1\n');
    return `
      <div class="route-stop" onclick="selectVisit('${v.id}')">
        <div class="rs-circle ${cls}">${icon}</div>
        <div class="rs-name">${(v.patients?.name||'?')}<br>어르신</div>
        <div class="rs-time">${time}</div>
      </div>
      ${i < _todayVisits.length-1 ? `<div class="route-line ${lineCls}"></div>` : ''}
    `;
  }).join('');
}

function selectVisit(id){
  _currentVisit = _todayVisits.find(v => v.id === id);

}

// ===== Haversine 거리 계산 (m 단위) =====
function haversine(lat1, lng1, lat2, lng2){
  if(lat1==null||lng1==null||lat2==null||lng2==null) return null;
  const R = 6371000; // 지구 반경 (m)
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  // 부동소수점 오차 방지: a가 1을 넘으면 NaN 발생 → Math.min으로 클램프
  return Math.round(2 * R * Math.asin(Math.min(1, Math.sqrt(a))));
}

// ===== GPS 체크인 (거리 검증 포함) =====
async function doCheckin(){
  if(!_currentVisit) return;
  const btn = document.getElementById('gpsBtn');
  btn.disabled = true;
  btn.textContent = '⏳ GPS 확인 중...';
  const warnEl = document.getElementById('gpsWarn');
  warnEl.style.display = 'none';

  // GPS 좌표 획득
  let coords = null;
  try {
    coords = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
        err => reject(err),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });
  } catch(e){
    if(!confirm('GPS를 가져올 수 없습니다. GPS 없이 체크인하시겠어요?')){
      btn.disabled = false;
      btn.textContent = '🛰️ GPS 체크인';
      return;
    }
  }

  // 거리 검증
  let distance = null;
  const patient = _currentVisit.patients;

  // ===== 첫 방문: 어르신 댁 좌표 미등록 시 현재 위치로 자동 등록 =====
  if(coords && patient && (!patient.gps_lat || !patient.gps_lng)){
    const ok = confirm(
      `📍 ${patient.name} 어르신 댁의 위치가 아직 등록되지 않았어요.\n\n` +
      `현재 보호사님 위치를 어르신 댁 좌표로 저장할까요?\n` +
      `(다음 방문부터 GPS 거리 검증이 자동으로 작동합니다)`
    );
    if(ok){
      const { error: updErr } = await sb.from('patients')
        .update({ gps_lat: coords.lat, gps_lng: coords.lng })
        .eq('id', patient.id);
      if(updErr){
        console.warn('수급자 좌표 저장 실패:', updErr);
      } else {
        // 메모리상 patient 객체도 업데이트 (이번 체크인 거리 계산은 0이 됨)
        patient.gps_lat = coords.lat;
        patient.gps_lng = coords.lng;
        warnEl.className = 'gps-warn';
        warnEl.style.background = '#dcfce7';
        warnEl.style.borderColor = '#86efac';
        warnEl.style.color = '#166534';
        warnEl.style.display = 'block';
        warnEl.innerHTML = `✅ <b>어르신 댁 좌표가 등록되었습니다.</b><br>다음 방문부터 거리 검증이 적용됩니다.`;
        setTimeout(() => warnEl.style.display='none', 5000);
      }
    }
  }

  if(coords && patient?.gps_lat && patient?.gps_lng){
    distance = haversine(coords.lat, coords.lng, patient.gps_lat, patient.gps_lng);

    if(distance > 500){
      warnEl.className = 'gps-warn danger';
      warnEl.style.display = 'block';
      warnEl.innerHTML = `🚫 <b>방문지에서 ${distance}m 떨어져 있습니다.</b><br>500m 이상 떨어진 곳에서는 체크인할 수 없어요. 어르신 댁에서 다시 시도해주세요.`;
      btn.disabled = false;
      btn.textContent = '🛰️ GPS 체크인';
      return;
    } else if(distance > 100){
      warnEl.className = 'gps-warn';
      warnEl.style.display = 'block';
      warnEl.innerHTML = `⚠️ <b>방문지에서 ${distance}m 거리입니다.</b><br>위치가 정확한지 확인해주세요. 케어 사진 업로드를 권장합니다.`;
      if(!confirm(`방문지에서 ${distance}m 거리에서 체크인합니다. 계속할까요?`)){
        btn.disabled = false;
        btn.textContent = '🛰️ GPS 체크인';
        return;
      }
    } else {
      warnEl.className = 'gps-warn';
      warnEl.style.background = '#dcfce7';
      warnEl.style.borderColor = '#86efac';
      warnEl.style.color = '#166534';
      warnEl.style.display = 'block';
      warnEl.innerHTML = `✅ <b>방문지 ${distance}m 이내</b> · GPS 정확도 ${Math.round(coords.acc)}m`;
      setTimeout(() => warnEl.style.display='none', 4000);
    }
  }

  const now = new Date();
  const startTime = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':00';

  const { error } = await sb.from('visits').update({
    status: 'in_progress',
    start_time: _currentVisit.start_time || startTime,
    gps_checkin_lat: coords?.lat,
    gps_checkin_lng: coords?.lng,
    checkin_distance_m: distance
  }).eq('id', _currentVisit.id);

  if(error){
    alert('체크인 실패: ' + error.message);
    btn.disabled = false;
    btn.textContent = '🛰️ GPS 체크인';
    return;
  }

  // 보호자에게 도착 알림
  notifyGuardians('visit_start', `${_currentVisit.patients.name} 어르신 댁 도착`,
    `${_profile.name} 보호사가 ${(_currentVisit.start_time||'').slice(0,5)} 케어를 시작했습니다.`);

  await loadTodayVisits();
}

// ===== 사진 업로드 =====
async function uploadPhoto(input){
  const file = input.files?.[0];
  if(!file || !_currentVisit) return;
  // 파일 크기 제한 10MB
  if(file.size > 10 * 1024 * 1024){ alert('10MB 이하 사진만 업로드 가능합니다.'); input.value=''; return; }
  if(!file.type.startsWith('image/')){ alert('이미지 파일만 업로드 가능합니다.'); input.value=''; return; }

  // 파일명: <center_id>/<patient_id>/<visit_id>/<timestamp>_<filename>
  const path = `${_profile.center_id}/${_currentVisit.patient_id}/${_currentVisit.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_')}`;

  const { error: upErr } = await sb.storage.from('care-photos').upload(path, file, {
    cacheControl: '3600', upsert: false
  });
  if(upErr){ alert('사진 업로드 실패: '+upErr.message); input.value=''; return; }

  // visits.photos 배열에 추가
  const photos = Array.isArray(_currentVisit.photos) ? [..._currentVisit.photos] : [];
  photos.push({ path, uploaded_at: new Date().toISOString() });
  await sb.from('visits').update({ photos }).eq('id', _currentVisit.id);
  _currentVisit.photos = photos;

  input.value = '';
  renderPhotos();
}

async function renderPhotos(){
  const grid = document.getElementById('photoGrid');
  const photos = _currentVisit?.photos || [];
  document.getElementById('photoCount').textContent = `${photos.length}장`;

  // signed URL 병렬 발급 (성능: N번 await → 1번 Promise.all)
  const urls = await Promise.all(photos.map(p =>
    sb.storage.from('care-photos').createSignedUrl(p.path, 3600).then(r => r.data?.signedUrl || '')
  ));

  let html = `<div class="photo-thumb add" onclick="document.getElementById('photoInput').click()">+</div>`;
  photos.forEach((p, i) => {
    const safePath = p.path.replace(/'/g, "\\'");
    html += `<div class="photo-thumb"><img src="${urls[i]}" alt="케어 사진" loading="lazy"><button class="del" onclick="deletePhoto('${safePath}')">✕</button></div>`;
  });
  grid.innerHTML = html;
}

async function deletePhoto(path){
  if(!confirm('사진을 삭제할까요?')) return;
  await sb.storage.from('care-photos').remove([path]);
  const photos = (_currentVisit.photos||[]).filter(p => p.path !== path);
  await sb.from('visits').update({ photos }).eq('id', _currentVisit.id);
  _currentVisit.photos = photos;
  renderPhotos();
}

// ===== 체크리스트 =====
function loadChecklist(){
  // care_log JSON에 저장된 체크리스트 복원
  let log = {};
  try { log = JSON.parse(_currentVisit.care_log || '{}'); } catch(e){}

  _checklist = DEFAULT_CHECKLIST.map(item => ({
    ...item,
    done: !!log.checks?.[item.id]?.done,
    time: log.checks?.[item.id]?.time || null
  }));

  renderChecklist();
  document.getElementById('memoInput').value = log.memo || '';
}

function renderChecklist(){
  const wrap = document.getElementById('checklistItems');
  wrap.innerHTML = _checklist.map((it, i) => `
    <div class="check-item" onclick="toggleCheck(${i})">
      <div class="check-box ${it.done?'checked':''}">${it.done?'✓':'○'}</div>
      <div class="check-content">
        <div class="check-ttl">${it.icon} ${it.title}</div>
        <div class="check-sub">${it.sub}</div>
      </div>
      <span class="check-time" style="${it.done?'':'color:var(--gray)'}">${it.time||'미완료'}</span>
    </div>
  `).join('');

  const done = _checklist.filter(c=>c.done).length;
  document.getElementById('checkProgress').textContent = `${done}/${_checklist.length} 완료`;
  document.getElementById('progressFill').style.width = (done/_checklist.length*100) + '%';
}

async function toggleCheck(idx){
  const it = _checklist[idx];
  it.done = !it.done;
  if(it.done){
    const now = new Date();
    it.time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  } else {
    it.time = null;
  }
  renderChecklist();

  // 비동기 저장 (실패해도 UI는 유지)
  saveProgress();
}

let _saveTimer = null;
function saveProgress(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    const log = {
      checks: Object.fromEntries(_checklist.map(c => [c.id, { done:c.done, time:c.time }])),
      memo: document.getElementById('memoInput').value
    };
    await sb.from('visits').update({ care_log: JSON.stringify(log) }).eq('id', _currentVisit.id);
  }, 800);
}

document.getElementById('memoInput').addEventListener('input', saveProgress);

// ===== 케어 완료 =====
async function completeVisit(){
  const done = _checklist.filter(c=>c.done).length;
  if(done < _checklist.length){
    if(!confirm(`아직 ${_checklist.length-done}개 항목이 미완료예요. 그래도 완료 처리할까요?`)) return;
  }

  const btn = document.getElementById('completeBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ 전송 중...';

  // GPS 체크아웃
  let coords = null;
  try {
    coords = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(
      p => res({ lat:p.coords.latitude, lng:p.coords.longitude }), rej,
      { enableHighAccuracy:true, timeout:8000 }
    ));
  } catch(e){}

  const now = new Date();
  const endTime = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':00';
  const log = {
    checks: Object.fromEntries(_checklist.map(c => [c.id, { done:c.done, time:c.time }])),
    memo: document.getElementById('memoInput').value
  };

  const { error } = await sb.from('visits').update({
    status: 'completed',
    end_time: endTime,
    care_log: JSON.stringify(log),
    gps_checkout_lat: coords?.lat,
    gps_checkout_lng: coords?.lng
  }).eq('id', _currentVisit.id);

  if(error){
    alert('완료 처리 실패: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '✅ 케어 완료 전송';
    return;
  }

  // 케어 완료 즉시 알림은 발송하지 않음 (저녁 7시 일일 보고서로 통합)
  // 도착 알림(GPS 체크인)만 즉시 발송 → 보호자 알림 피로도 ↓
  // 일일 보고서는 send-daily-report Edge Function이 매일 19:00 KST 자동 발송

  btn.innerHTML = '✅ 전송 완료!';
  setTimeout(() => loadTodayVisits(), 1500);
}

// ===== 보호자에게 알림 =====
async function notifyGuardians(type, title, body){
  try {
    // patient_guardians 조회
    const { data: pgs } = await sb.from('patient_guardians')
      .select('guardian_id, profiles:guardian_id(phone, name)')
      .eq('patient_id', _currentVisit.patient_id)
      .eq('notify_enabled', true);

    if(!pgs || pgs.length === 0) return;

    for(const pg of pgs){
      await PushClient.sendNotification(sb, {
        recipient_id: pg.guardian_id,
        recipient_phone: pg.profiles?.phone,
        recipient_name: pg.profiles?.name,
        type, title, body,
        url: '/care-customer.html',
        center_id: _profile.center_id
      });
    }
  } catch(e){
    console.warn('알림 발송 실패:', e);
  }
}

// ===== 푸시 권한 요청 =====
async function enablePush(){
  const r = await PushClient.requestAndSubscribe(sb, _profile?.center_id);
  alert(r.success ? '🔔 알림이 활성화되었습니다.' : '알림 활성화 실패: ' + r.error);
}

// ===== 네비게이션 =====
function openNavi(){
  if(!_currentVisit?.patients?.address){
    alert('주소가 등록되지 않았습니다.');
    return;
  }
  const addr = encodeURIComponent(_currentVisit.patients.address);
  // 카카오맵 길찾기
  location.href = `https://map.kakao.com/link/to/${addr},,`;
}

// ===== 로그아웃 =====
async function doLogout(){
  if(!confirm('로그아웃 하시겠어요?')) return;
  await sb.auth.signOut();
  location.href = '/care-login.html';
}
</script>
