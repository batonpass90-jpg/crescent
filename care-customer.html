<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CareOn · 보호자 앱</title>
<meta name="description" content="CareOn 보호자 앱 — 어르신의 케어 현황, 케어일지, 사진을 실시간으로 확인하세요.">
<meta property="og:type" content="website">
<meta property="og:title" content="요양 통합 플랫폼 · CareOn">
<meta property="og:description" content="보호자 앱 — 어르신 케어 현황 실시간 확인 / 케어일지 / 활동 사진">
<meta property="og:image" content="https://crescentstudio.co.kr/careon-icon.svg">
<meta property="og:url" content="https://crescentstudio.co.kr/care-customer.html">
<meta property="og:site_name" content="CareOn">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0D9488">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/center-router.js"></script>
<script src="/push-client.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--teal:#0D9488;--teal2:#14B8A6;--tl:#F0FDFA;--navy:#0F1B2D;--gray:#6b7280;--border:#f0f0f0;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f8fafc;color:var(--navy);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

.hd{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hd-logo{font-size:16px;font-weight:800;color:var(--navy)}
.hd-logo span{color:var(--teal)}
.hd-right{display:flex;align-items:center;gap:12px}
.hd-bell{font-size:20px;cursor:pointer;position:relative}
.hd-bell-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff;display:none}
.hd-bell-dot.show{display:block}
.hd-avatar{width:32px;height:32px;border-radius:50%;background:var(--tl);display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--teal2);cursor:pointer}

.wrap{padding:16px}

.empty-msg{background:#fff;border-radius:18px;padding:40px 20px;text-align:center;color:var(--gray);border:1px solid var(--border);margin-bottom:14px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

.patient-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.patient-tabs::-webkit-scrollbar{display:none}
.patient-tab{flex-shrink:0;padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:50px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;font-family:inherit}
.patient-tab.active{background:var(--teal);border-color:var(--teal);color:#fff}

.care-card{background:linear-gradient(135deg,#042f2e,#0f766e);border-radius:22px;padding:22px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.care-card::after{content:'🏠';position:absolute;right:-10px;bottom:-15px;font-size:90px;opacity:.08}
.care-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.care-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.care-status{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 1.5s infinite}
.status-dot.gray{background:#94a3b8;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.care-worker{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;margin-bottom:14px}
.worker-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px}
.worker-name{font-size:14px;font-weight:700}
.worker-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.worker-call{margin-left:auto;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.care-time{display:flex;align-items:center;justify-content:space-between}
.time-item{text-align:center}
.time-label{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.time-val{font-size:16px;font-weight:800}
.time-div{font-size:20px;color:rgba(255,255,255,.3)}

.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.card-ttl{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-ttl::before{content:'';width:3px;height:12px;background:var(--teal);border-radius:2px}

.check-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.check-icon{font-size:18px}
.check-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-done{background:#dcfce7;color:#16a34a}
.badge-ing{background:#dbeafe;color:#1d4ed8}
.badge-wait{background:var(--border);color:var(--gray)}

.next-card{background:var(--tl);border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid #99f6e4;display:flex;align-items:center;gap:14px}
.next-icon{width:44px;height:44px;background:var(--teal);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.next-label{font-size:11px;color:var(--teal);font-weight:700;margin-bottom:3px}
.next-ttl{font-size:15px;font-weight:800;color:var(--navy)}
.next-sub{font-size:12px;color:var(--gray);margin-top:2px}

.btn-row{display:flex;gap:10px;margin-bottom:14px}
.btn-call{flex:1;background:var(--teal);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-center{flex:1;background:#fff;color:var(--navy);border:1.5px solid var(--border);border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:var(--gray);font-weight:600;padding:4px 0}
.bnav-item.active{color:var(--teal)}
.bnav-icon{font-size:22px}

.memo-block{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px 14px;font-size:13px;color:#78350f;line-height:1.6;margin-top:10px}

/* 뷰 시스템 */
.view{display:none}
.view.active{display:block}

/* 일지 카드 */
.log-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.log-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.log-date{font-size:13px;font-weight:700;color:var(--navy)}
.log-time{font-size:11px;color:var(--gray)}
.log-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.log-chk{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:#dcfce7;color:#16a34a}
.log-chk.no{background:var(--border);color:var(--gray)}
.log-memo{margin-top:10px;padding:10px 12px;background:#fffbeb;border-radius:10px;font-size:12px;color:#78350f;line-height:1.6}
.log-photos{display:flex;gap:6px;margin-top:10px;overflow-x:auto;scrollbar-width:none}
.log-photos::-webkit-scrollbar{display:none}
.log-photos img{width:70px;height:70px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer}

/* 사진 갤러리 */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 0 10px}
.gallery img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;cursor:pointer}

/* 사진 라이트박스 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo" id="centerLogo">CareOn</div>
  <div class="hd-right">
    <div class="hd-bell" onclick="enablePush()">🔔<span class="hd-bell-dot" id="bellDot"></span></div>
    <div class="hd-avatar" onclick="doLogout()">👤</div>
  </div>
</div>

<div class="wrap">

  <div class="patient-tabs" id="patientTabs" style="display:none"></div>

<!-- ========== 홈 뷰 ========== -->
<div class="view active" id="view-home">

  <div class="empty-msg" id="emptyMsg" style="display:none">
    <div class="empty-icon">👴</div>
    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px">연결된 어르신이 없습니다</div>
    <div style="font-size:12px">센터에 보호자 등록을 요청하세요</div>
  </div>

  <!-- 현재 케어 상태 -->
  <div class="care-card" id="careCard" style="display:none">
    <div class="care-top">
      <div class="care-name" id="patientName">-</div>
      <div class="care-status" id="careStatus"><span class="status-dot gray"></span>오늘 일정 없음</div>
    </div>
    <div class="care-worker" id="workerBlock" style="display:none">
      <div class="worker-avatar">👩‍⚕️</div>
      <div>
        <div class="worker-name" id="workerName">-</div>
        <div class="worker-sub" id="workerSub">담당 보호사</div>
      </div>
      <button class="worker-call" id="workerCallBtn">📞</button>
    </div>
    <div class="care-time" id="careTime" style="display:none">
      <div class="time-item"><div class="time-label">방문 시작</div><div class="time-val" id="visitStart">-</div></div>
      <div class="time-div">→</div>
      <div class="time-item"><div class="time-label">예정 종료</div><div class="time-val" id="visitEnd">-</div></div>
      <div class="time-div">·</div>
      <div class="time-item"><div class="time-label">진행</div><div class="time-val" id="visitElapsed">-</div></div>
    </div>
  </div>

  <!-- 케어 체크리스트 -->
  <div class="card" id="checklistCard" style="display:none">
    <div class="card-ttl">오늘 케어 현황</div>
    <div id="checklistItems"></div>
    <div id="memoBlock"></div>
  </div>

  <!-- 다음 방문 -->
  <div class="next-card" id="nextCard" style="display:none">
    <div class="next-icon">📅</div>
    <div>
      <div class="next-label">다음 방문 예정</div>
      <div class="next-ttl" id="nextDate">-</div>
      <div class="next-sub" id="nextSub">-</div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-row" id="btnRow" style="display:none">
    <button class="btn-call" onclick="callWorker()">📞 보호사 연락</button>
    <button class="btn-center" onclick="callCenter()">🏠 센터 문의</button>
  </div>
</div>

<!-- ========== 일지 뷰 ========== -->
<div class="view" id="view-log">
  <div class="card-ttl" style="margin:14px 4px">📋 케어일지 (최근 30일)</div>
  <div id="logList">
    <div class="empty-msg"><div class="empty-icon">📋</div><div>로딩 중...</div></div>
  </div>
</div>

<!-- ========== 사진 뷰 ========== -->
<div class="view" id="view-photos">
  <div class="card-ttl" style="margin:14px 4px">📷 케어 사진 모아보기</div>
  <div id="galleryWrap">
    <div class="empty-msg"><div class="empty-icon">📷</div><div>로딩 중...</div></div>
  </div>
</div>

<!-- ========== 문의 뷰 ========== -->
<div class="view" id="view-contact">
  <div class="card" style="margin-top:14px">
    <div class="card-ttl">💬 센터 연락처</div>
    <div style="font-size:14px;line-height:1.8">
      <div><b id="contactCenterName">센터명</b></div>
      <div style="color:var(--gray)" id="contactCenterAddr">주소</div>
      <div style="margin-top:8px"><b>📞</b> <a id="contactCenterPhone" style="color:var(--teal)">-</a></div>
    </div>
    <button class="btn-call" style="width:100%;margin-top:14px" onclick="callCenter()">📞 센터 전화하기</button>
  </div>
</div>

</div>

<!-- 사진 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg" alt="">
</div>

<div class="bnav">
  <div class="bnav-item active" data-view="home" onclick="showView('home')"><span class="bnav-icon">🏠</span>홈</div>
  <div class="bnav-item" data-view="log" onclick="showView('log')"><span class="bnav-icon">📋</span>일지</div>
  <div class="bnav-item" data-view="photos" onclick="showView('photos')"><span class="bnav-icon">📷</span>사진</div>
  <div class="bnav-item" data-view="contact" onclick="showView('contact')"><span class="bnav-icon">💬</span>문의</div>
</div>

<script>
const CHECKLIST_LABELS = {
  meal:    { icon:'🍚', title:'식사 보조' },
  posture: { icon:'🤸', title:'체위 변경' },
  stretch: { icon:'🧘', title:'스트레칭' },
  medi:    { icon:'💊', title:'투약 확인' },
  hygiene: { icon:'🛁', title:'청결 케어' }
};

let sb = null;
let _profile = null;
let _patients = [];
let _activePatient = null;
let _todayVisit = null;
let _nextVisit = null;
let _worker = null;
let _center = null;
let _realtimeChannel = null;

// ===== 부팅 =====
window.addEventListener('load', async () => {
  sb = window.supabase.createClient(
    'https://swsemxzgzcwwrhowuaqz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3c2VteHpnemN3d3Job3d1YXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDMyMjAsImV4cCI6MjA5MjcxOTIyMH0.ebLiCDnTfnd-rCcBcMFiN_BYpIcOcTqfi_Mh_xQqD2Q'
  );

  const { data: { session } } = await sb.auth.getSession();
  if(!session){ location.href = CenterRouter.buildUrl('/care-login.html'); return; }

  const { data: profile } = await sb.from('profiles')
    .select('*, centers(name, phone, address)')
    .eq('id', session.user.id).single();

  if(!profile || profile.role !== 'guardian'){
    alert('보호자 계정이 아닙니다.');
    await sb.auth.signOut();
    location.href = '/care-login.html';
    return;
  }
  _profile = profile;
  _center = profile.centers;
  if(_center?.name) document.getElementById('centerLogo').innerHTML = _center.name;

  // 본인이 담당하는 어르신 조회
  const { data: pgs } = await sb.from('patient_guardians')
    .select('patient_id, relationship, is_primary, patients(*)')
    .eq('guardian_id', session.user.id);

  _patients = (pgs || []).map(pg => ({ ...pg.patients, _relationship: pg.relationship }));
  _patients = _patients.filter(p => p.status === 'active');

  if(_patients.length === 0){
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  // 어르신 탭 렌더 (2명 이상일 때만 보이기)
  if(_patients.length > 1) renderPatientTabs();

  selectPatient(_patients[0].id);

  // 알림 뱃지: 미확인 알림 있는지 체크
  checkUnreadNotifications();
});

function renderPatientTabs(){
  const wrap = document.getElementById('patientTabs');
  wrap.style.display = 'flex';
  wrap.innerHTML = _patients.map(p => `
    <button class="patient-tab" data-id="${p.id}" onclick="selectPatient('${p.id}')">${p.name} 어르신</button>
  `).join('');
}

async function selectPatient(id){
  _activePatient = _patients.find(p => p.id === id);
  if(!_activePatient) return;

  document.querySelectorAll('.patient-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === id);
  });

  document.getElementById('careCard').style.display = 'block';
  document.getElementById('btnRow').style.display = 'flex';
  document.getElementById('patientName').textContent = _activePatient.name + ' 어르신';

  await loadVisits();
  setupRealtime();
}

async function loadVisits(){
  const today = new Date().toISOString().split('T')[0];

  // 오늘 방문 (가장 최신 status)
  const { data: todays } = await sb.from('visits')
    .select('*, workers(name, phone, hire_date, specialty)')
    .eq('patient_id', _activePatient.id)
    .eq('scheduled_date', today)
    .order('start_time', { ascending: true });

  _todayVisit = (todays && todays.length) ? (todays.find(v=>v.status==='in_progress') || todays[todays.length-1]) : null;
  _worker = _todayVisit?.workers;

  // 다음 방문
  const { data: future } = await sb.from('visits')
    .select('*, workers(name)')
    .eq('patient_id', _activePatient.id)
    .gt('scheduled_date', today)
    .order('scheduled_date', { ascending: true })
    .limit(1);
  _nextVisit = future?.[0] || null;

  renderTodayVisit();
  renderNextVisit();
}

function renderTodayVisit(){
  const statusEl = document.getElementById('careStatus');
  const workerBlock = document.getElementById('workerBlock');
  const careTime = document.getElementById('careTime');
  const checklistCard = document.getElementById('checklistCard');

  if(!_todayVisit){
    statusEl.innerHTML = '<span class="status-dot gray"></span>오늘 일정 없음';
    workerBlock.style.display = 'none';
    careTime.style.display = 'none';
    checklistCard.style.display = 'none';
    return;
  }

  // 보호사 정보
  if(_worker){
    workerBlock.style.display = 'flex';
    document.getElementById('workerName').textContent = _worker.name + ' 보호사';
    const career = _worker.hire_date ? careerFromDate(_worker.hire_date) : '';
    document.getElementById('workerSub').textContent = '담당 보호사' + (career ? ' · 경력 '+career : '');
  } else {
    workerBlock.style.display = 'none';
  }

  // 시간
  careTime.style.display = 'flex';
  document.getElementById('visitStart').textContent = (_todayVisit.start_time || '-').slice(0,5);
  document.getElementById('visitEnd').textContent = (_todayVisit.end_time || _todayVisit.scheduled_end_time || '-').slice(0,5);

  // 상태별 표시
  if(_todayVisit.status === 'in_progress'){
    statusEl.innerHTML = '<span class="status-dot"></span>방문중';
    updateElapsed();
  } else if(_todayVisit.status === 'completed'){
    statusEl.innerHTML = '<span class="status-dot gray"></span>✅ 케어 완료';
    document.getElementById('visitElapsed').textContent = '완료';
  } else {
    statusEl.innerHTML = '<span class="status-dot gray"></span>대기 중';
    document.getElementById('visitElapsed').textContent = '-';
  }

  // 체크리스트
  renderChecklist();
}

function updateElapsed(){
  if(!_todayVisit?.start_time || _todayVisit.status !== 'in_progress') return;
  const [h,m] = _todayVisit.start_time.split(':').map(Number);
  const start = new Date();
  start.setHours(h,m,0,0);
  const diff = Math.max(0, Math.floor((new Date() - start)/60000));
  document.getElementById('visitElapsed').textContent = diff < 60 ? diff+'분' : Math.floor(diff/60)+'시간 '+(diff%60)+'분';
}
setInterval(updateElapsed, 30000);

function renderChecklist(){
  const card = document.getElementById('checklistCard');
  if(!_todayVisit){ card.style.display = 'none'; return; }

  let log = {};
  try { log = JSON.parse(_todayVisit.care_log || '{}'); } catch(e){}
  const checks = log.checks || {};

  card.style.display = 'block';
  const items = Object.keys(CHECKLIST_LABELS).map(key => {
    const c = checks[key] || {};
    const lbl = CHECKLIST_LABELS[key];
    let badge = '<span class="check-badge badge-wait">대기</span>';
    if(c.done) badge = '<span class="check-badge badge-done">✓ 완료</span>';
    else if(_todayVisit.status === 'in_progress') badge = '<span class="check-badge badge-ing">진행중</span>';
    return `
      <div class="check-item">
        <div class="check-left"><span class="check-icon">${lbl.icon}</span>${lbl.title}</div>
        ${badge}
      </div>
    `;
  }).join('');
  document.getElementById('checklistItems').innerHTML = items;

  // 메모 표시 (케어 완료 후만)
  const memoBlock = document.getElementById('memoBlock');
  if(_todayVisit.status === 'completed' && log.memo){
    memoBlock.innerHTML = `<div class="memo-block">📝 ${log.memo}</div>`;
  } else {
    memoBlock.innerHTML = '';
  }
}

function renderNextVisit(){
  const card = document.getElementById('nextCard');
  if(!_nextVisit){ card.style.display = 'none'; return; }
  card.style.display = 'flex';
  const d = new Date(_nextVisit.scheduled_date);
  const dayNames = ['일','월','화','수','목','금','토'];
  document.getElementById('nextDate').textContent = `${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]}) ${(_nextVisit.start_time||'').slice(0,5)}`;
  document.getElementById('nextSub').textContent = (_nextVisit.workers?.name || '-') + ' 보호사 · 방문요양';
}

function careerFromDate(hireDate){
  if(!hireDate) return '';
  const start = new Date(hireDate);
  if(isNaN(start.getTime())) return '';
  const years = Math.floor((new Date() - start) / (365.25*24*60*60*1000));
  return years > 0 ? years + '년' : '';
}

// ===== 실시간 구독 (visits 테이블 변경 감지) =====
function setupRealtime(){
  if(_realtimeChannel) sb.removeChannel(_realtimeChannel);
  _realtimeChannel = sb.channel('visits-' + _activePatient.id)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'visits',
      filter: 'patient_id=eq.' + _activePatient.id
    }, (payload) => {
      console.log('[Realtime] visits update:', payload);
      loadVisits();
    })
    .subscribe();
}

// ===== 액션 =====
function callWorker(){
  if(!_worker?.phone){ alert('보호사 연락처가 등록되지 않았습니다.'); return; }
  location.href = 'tel:' + _worker.phone.replace(/-/g,'');
}
function callCenter(){
  if(!_center?.phone){ alert('센터 연락처가 등록되지 않았습니다.'); return; }
  location.href = 'tel:' + _center.phone.replace(/-/g,'');
}
document.getElementById('workerCallBtn').onclick = callWorker;

async function enablePush(){
  const r = await PushClient.requestAndSubscribe(sb, _profile?.center_id);
  alert(r.success ? '🔔 알림이 활성화되었습니다.' : '알림 활성화 실패: ' + r.error);
}

async function checkUnreadNotifications(){
  const { data } = await sb.from('notifications')
    .select('id', { count:'exact', head:false })
    .eq('recipient_id', _profile.id)
    .gte('created_at', new Date(Date.now() - 24*60*60*1000).toISOString());
  document.getElementById('bellDot').classList.toggle('show', (data?.length||0) > 0);
}

async function doLogout(){
  if(!confirm('로그아웃 하시겠어요?')) return;
  if(_realtimeChannel) sb.removeChannel(_realtimeChannel);
  await sb.auth.signOut();
  location.href = '/care-login.html';
}

// 페이지 떠날 때 Realtime 채널 정리 (메모리 누수 방지)
window.addEventListener('beforeunload', () => {
  if(_realtimeChannel && sb) sb.removeChannel(_realtimeChannel);
});

// ===== 뷰 전환 =====
function showView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name)?.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.toggle('active', b.dataset.view === name));

  if(name === 'log') loadCareLog();
  else if(name === 'photos') loadGallery();
  else if(name === 'contact') renderContact();
}

// ===== 케어일지 (최근 30일) =====
async function loadCareLog(){
  if(!_activePatient) return;
  const list = document.getElementById('logList');
  list.innerHTML = '<div class="empty-msg"><div class="empty-icon">📋</div><div>로딩 중...</div></div>';

  const since = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
  const { data: logs } = await sb.from('visits')
    .select('*, workers(name)')
    .eq('patient_id', _activePatient.id)
    .eq('status', 'completed')
    .gte('scheduled_date', since)
    .order('scheduled_date', { ascending: false })
    .order('start_time', { ascending: false })
    .limit(50);

  if(!logs || logs.length === 0){
    list.innerHTML = '<div class="empty-msg"><div class="empty-icon">📋</div><div>최근 30일 내 완료된 케어가 없습니다</div></div>';
    return;
  }

  // 사진 thumbnail signed URL 병렬 발급 (성능: N번 await → 1번 Promise.all)
  const allPhotoPaths = logs.flatMap(v => (v.photos||[]).map(p => p.path));
  const photoUrls = {};
  const urlResults = await Promise.all(
    allPhotoPaths.map(path => sb.storage.from('care-photos').createSignedUrl(path, 3600).then(r => [path, r.data?.signedUrl || '']))
  );
  urlResults.forEach(([path, url]) => { photoUrls[path] = url; });

  list.innerHTML = logs.map(v => {
    let log = {};
    try { log = JSON.parse(v.care_log||'{}'); } catch(e){}
    const checks = log.checks || {};
    const date = new Date(v.scheduled_date);
    const dayNames = ['일','월','화','수','목','금','토'];

    const checksHtml = Object.entries(CHECKLIST_LABELS).map(([k, lbl]) => {
      const c = checks[k] || {};
      return `<span class="log-chk ${c.done?'':'no'}">${lbl.icon} ${c.done?lbl.title:lbl.title+' ✕'}</span>`;
    }).join('');

    const photosHtml = (v.photos||[]).length ? `
      <div class="log-photos">
        ${v.photos.map(p => {
          const url = photoUrls[p.path]||'';
          return `<img src="${escapeAttr(url)}" data-url="${escapeAttr(url)}" onclick="openLightbox(this.dataset.url)" alt="케어 사진" loading="lazy">`;
        }).join('')}
      </div>` : '';

    return `
      <div class="log-card">
        <div class="log-hd">
          <div class="log-date">📅 ${date.getMonth()+1}월 ${date.getDate()}일 (${dayNames[date.getDay()]})</div>
          <div class="log-time">${(v.start_time||'').slice(0,5)} ~ ${(v.end_time||'').slice(0,5)}</div>
        </div>
        <div style="font-size:12px;color:var(--gray);margin-bottom:6px">👩‍⚕️ ${escapeHtml(v.workers?.name||'-')} 보호사</div>
        <div class="log-checks">${checksHtml}</div>
        ${log.memo ? `<div class="log-memo">📝 ${escapeHtml(log.memo)}</div>` : ''}
        ${photosHtml}
      </div>
    `;
  }).join('');
}

// ===== HTML/속성 이스케이프 (XSS 방어) =====
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

// ===== 사진 갤러리 =====
async function loadGallery(){
  if(!_activePatient) return;
  const wrap = document.getElementById('galleryWrap');
  wrap.innerHTML = '<div class="empty-msg"><div class="empty-icon">📷</div><div>로딩 중...</div></div>';

  const since = new Date(Date.now() - 90*24*60*60*1000).toISOString().split('T')[0];
  const { data: visits } = await sb.from('visits')
    .select('id, scheduled_date, photos')
    .eq('patient_id', _activePatient.id)
    .gte('scheduled_date', since)
    .order('scheduled_date', { ascending: false });

  const allPhotos = [];
  for(const v of (visits||[])){
    for(const p of (v.photos||[])){
      allPhotos.push({ ...p, date: v.scheduled_date });
    }
  }

  if(allPhotos.length === 0){
    wrap.innerHTML = '<div class="empty-msg"><div class="empty-icon">📷</div><div>업로드된 사진이 없습니다</div></div>';
    return;
  }

  // signed URL 병렬 발급
  const urls = {};
  const urlResults = await Promise.all(
    allPhotos.map(p => sb.storage.from('care-photos').createSignedUrl(p.path, 3600).then(r => [p.path, r.data?.signedUrl || '']))
  );
  urlResults.forEach(([path, url]) => { urls[path] = url; });

  wrap.innerHTML = `<div class="gallery">${allPhotos.map(p => {
    const url = urls[p.path]||'';
    return `<img src="${escapeAttr(url)}" data-url="${escapeAttr(url)}" onclick="openLightbox(this.dataset.url)" alt="${escapeAttr(p.date||'')}" loading="lazy">`;
  }).join('')}</div>`;
}

function openLightbox(url){
  if(!url) return;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

// ===== 문의 뷰 =====
function renderContact(){
  document.getElementById('contactCenterName').textContent = _center?.name || '-';
  document.getElementById('contactCenterAddr').textContent = _center?.address || '-';
  const phoneEl = document.getElementById('contactCenterPhone');
  phoneEl.textContent = _center?.phone || '-';
  if(_center?.phone) phoneEl.href = 'tel:'+_center.phone.replace(/-/g,'');
}
