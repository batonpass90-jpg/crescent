<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 · CareOn</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0D9488;--navy:#0F1B2D;--gray:#6b7280;--red:#ef4444}
body{font-family:'Pretendard',sans-serif;background:linear-gradient(135deg,#042f2e,#0f766e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;color:var(--navy);border-radius:20px;padding:36px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.icon{width:72px;height:72px;border-radius:50%;background:#fee2e2;color:#dc2626;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 16px}
h1{font-size:20px;font-weight:800;margin-bottom:8px}
.desc{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:20px}
.detail{background:#fef3c7;color:#92400e;border-radius:12px;padding:14px;font-size:12px;margin-bottom:24px;text-align:left;line-height:1.7}
.btn{background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px}
.btn-ghost{background:transparent;border:1.5px solid #e2e8f0;color:var(--navy)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">❌</div>
  <h1>결제가 취소되었습니다</h1>
  <div class="desc">결제 처리 중 문제가 발생했거나 사용자가 취소했습니다.</div>
  <div class="detail" id="detail">사유를 확인 중입니다...</div>
  <button class="btn" onclick="location.href='/care-admin.html'">대시보드로 돌아가기</button>
  <button class="btn btn-ghost" onclick="history.back()">다시 시도</button>
</div>

<script>
window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const message = params.get('message') || '알 수 없는 사유';
  const orderId = params.get('orderId');

  document.getElementById('detail').innerHTML = `
    <b>사유:</b> ${message}<br>
    ${code ? `<b>코드:</b> ${code}<br>` : ''}
    ${orderId ? `<b>주문번호:</b> ${orderId.slice(-8).toUpperCase()}` : ''}
  `;

  // DB의 pending 주문을 failed로 업데이트
  if(orderId){
    const sb = window.supabase.createClient(
      'https://swsemxzgzcwwrhowuaqz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3c2VteHpnemN3d3Job3d1YXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDMyMjAsImV4cCI6MjA5MjcxOTIyMH0.ebLiCDnTfnd-rCcBcMFiN_BYpIcOcTqfi_Mh_xQqD2Q'
    );
    await sb.rpc('fail_sms_purchase', { p_order_id: orderId, p_reason: code + ': ' + message });
  }
});
</script>
</body>
</html>
